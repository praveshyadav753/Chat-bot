{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
        Login to Your Account
    </h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="/auth/web/token" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-gray-600">Email</label>
            <input type="text" name="username" required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">Password</label>
            <input type="password" name="password" required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-lg transition">
            Login
        </button>
    </form>

</div>
{% endblock %}
