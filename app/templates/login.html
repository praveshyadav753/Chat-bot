{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="card p-8 w-full max-w-md">

<h2 class="text-xl font-semibold mb-6 text-center">
Login
</h2>

{% if error %}
<div class="bg-red-500/20 text-red-300 p-3 rounded mb-4 text-sm">
{{ error }}
</div>
{% endif %}

<form method="POST" action="/auth/web/token" class="space-y-4">

<div>
<label class="text-sm text-gray-400">Username</label>
<input
name="username"
required
class="w-full mt-1 p-2 rounded outline-none focus:border-blue-400"
/>
</div>

<div>
<label class="text-sm text-gray-400">Password</label>
<input
type="password"
name="password"
required
class="w-full mt-1 p-2 rounded outline-none focus:border-blue-400"
/>
</div>

<button class="w-full bg-blue-500 hover:bg-blue-600 rounded p-2">
Login
</button>

</form>

</div>

{% endblock %}
