{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
        Create Account
    </h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div class="bg-green-100 text-green-600 p-3 rounded mb-4 text-sm">
            {{ success }}
        </div>
    {% endif %}

    <form method="POST" action="/auth/web/register" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-gray-600">Username</label>
            <input type="text"
                   name="username"
                   required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">Email</label>
            <input type="email"
                   name="email"
                   required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">Password</label>
            <input type="password"
                   name="password"
                   required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">Confirm Password</label>
            <input type="password"
                   name="confirm_password"
                   required
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        </div>

        <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-lg transition">
            Register
        </button>

    </form>

</div>

{% endblock %}
