{% extends "base.html" %}
{% block content %}

<div class="w-full max-w-2xl mx-auto mt-5 bg-white p-6 rounded shadow">

<div id="chat-box" class="h-96 overflow-y-auto border p-4 rounded bg-gray-50"></div>

<form onsubmit="sendMessage(event)" class="mt-4 flex items-center gap-3">

<input type="file" id="documents" multiple class="hidden"/>

<button
type="button"
onclick="document.getElementById('documents').click()"
class="p-2 rounded hover:bg-gray-300"
>
📎
</button>

<input
id="message"
class="flex-1 border p-2 rounded"
placeholder="Ask something..."
/>

<button id="send-btn" class="bg-blue-500 text-white px-4 py-2 rounded">
Send
</button>

</form>

<div id="document-list" class="mt-4 space-y-2"></div>

</div>

<script>

const fileInput = document.getElementById("documents")
const documentList = document.getElementById("document-list")
const chatBox = document.getElementById("chat-box")

let session_id = null

//
// DOCUMENT LOADER CARD
//

function createLoaderCard(name,id){

const card=document.createElement("div")

card.id="doc-"+id

card.className="flex items-center gap-3 p-3 border rounded"

card.innerHTML=`
<div class="animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full"></div>
<div>${name}</div>
`

documentList.appendChild(card)

}

//
// READY CARD
//

function markReady(id){

const card=document.getElementById("doc-"+id)

if(!card)return

card.innerHTML=`
<div class="text-green-500">✔</div>
<div>Document Ready</div>
`

}

//
// FAILED CARD
//

function markFailed(id){

const card=document.getElementById("doc-"+id)

if(!card)return

card.innerHTML=`
<div class="text-red-500">⚠</div>
<div>Processing Failed</div>
`

}

//
// FILE SELECT → AUTO UPLOAD
//

fileInput.addEventListener("change",async()=>{

const files=fileInput.files

if(!files.length)return

const formData=new FormData()

for(let file of files){

const tempId=crypto.randomUUID()

createLoaderCard(file.name,tempId)

formData.append("documents",file)

}

const res=await fetch("/api/documents/upload",{
method:"POST",
body:formData,
credentials:"include"
})

const data=await res.json()

for(let doc of data.documents){

createLoaderCard(doc.filename,doc.document_id)

}

})


//
// SSE STATUS STREAM
//

const evt=new EventSource("/api/document-status-stream")

evt.addEventListener("status",(event)=>{

const data=JSON.parse(event.data)

if(data.status==="READY") markReady(data.document_id)

if(data.status==="FAILED") markFailed(data.document_id)

})


//
// CHAT SEND
//

async function sendMessage(e){

e.preventDefault()

const message=document.getElementById("message").value

const formData=new FormData()

formData.append("message",message)

if(session_id) formData.append("session_id",    )

const response=await fetch("/api/chat/stream",{
method:"POST",
body:formData,
credentials:"include"
})

const reader=response.body.getReader()

const decoder=new TextDecoder()

let buffer=""

while(true){

const {value,done}=await reader.read()

if(done)break

buffer+=decoder.decode(value)

const lines=buffer.split("\n")

for(let line of lines){

if(line.startsWith("data: ")){

const data=line.replace("data: ","")

if(data.startsWith("SESSION:")){

session_id=data.replace("SESSION:","")

}else{

chatBox.innerHTML+=data

}

}

}

}

}

</script>

{% endblock %}
