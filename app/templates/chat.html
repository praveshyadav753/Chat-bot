{% extends "base.html" %} {% block content %}

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 p-4">
  <div class="max-w-4xl mx-auto flex flex-col gap-4 h-screen">
    <!-- Header -->
    <h1
      class="text-center text-3xl font-bold bg-gradient-to-r from-blue-600 to-blue-900 bg-clip-text text-transparent py-2"
    >
      💬 Smart Chat
    </h1>

    <!-- Main -->
    <div class="flex gap-4 flex-1 overflow-hidden">
      <!-- Chat Area -->
      <div
        class="flex-1 flex flex-col bg-white rounded-xl shadow-lg overflow-hidden"
      >
        <!-- Messages -->
        <div
          class="flex-1 overflow-y-auto p-6 bg-gray-50 space-y-3"
          id="chat-box"
        ></div>

        <!-- Input -->
        <div class="p-4 border-t border-gray-200 bg-white">
          <form onsubmit="sendMessage(event)" class="flex gap-3 items-end">
            <input type="file" id="documents" multiple class="hidden" />

            <button
              type="button"
              onclick="document.getElementById('documents').click()"
              class="w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 transition text-xl flex-shrink-0"
            >
              📎
            </button>

            <textarea
              id="message"
              rows="1"
              placeholder="Ask something..."
              class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm resize-none max-h-28 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-sans transition"
            ></textarea>

            <button
              type="submit"
              id="send-btn"
              class="px-5 py-2 bg-blue-600 text-white rounded-lg font-semibold text-sm hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0"
            >
              Send
            </button>
          </form>
        </div>
      </div>

      <!-- Sidebar -->
      <div
        class="w-64 bg-white rounded-xl shadow-lg p-4 flex flex-col overflow-y-auto"
      >
        <p class="text-xs font-bold uppercase text-gray-500 tracking-wide mb-3">
          📄 Documents
        </p>
        <div id="document-list" class="flex flex-col gap-2"></div>
        <div
          id="empty-state"
          class="flex-1 flex items-center justify-center text-sm text-gray-400"
        >
          No documents yet
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Markdown content styling inside bubbles */
  .prose h1,
  .prose h2,
  .prose h3 {
    font-weight: 700;
    margin: 0.75rem 0 0.25rem;
  }
  .prose h1 {
    font-size: 1.4em;
  }
  .prose h2 {
    font-size: 1.2em;
  }
  .prose h3 {
    font-size: 1.05em;
  }
  .prose ul,
  .prose ol {
    padding-left: 1.5rem;
    margin: 0.4rem 0;
  }
  .prose li {
    margin: 0.2rem 0;
  }
  .prose code {
    background: #f3f4f6;
    padding: 0.15em 0.35em;
    border-radius: 4px;
    font-size: 0.88em;
    font-family: monospace;
  }
  .prose pre {
    background: #111827;
    color: #e5e7eb;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.5rem 0;
  }
  .prose pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  .prose blockquote {
    border-left: 3px solid #3b82f6;
    padding-left: 0.75rem;
    opacity: 0.8;
    margin: 0.5rem 0;
  }
  .prose table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.9em;
    margin: 0.5rem 0;
  }
  .prose th,
  .prose td {
    border: 1px solid #d1d5db;
    padding: 0.4rem 0.6rem;
  }
  .prose th {
    background: #f3f4f6;
    font-weight: 600;
  }
  .prose a {
    color: #2563eb;
    border-bottom: 1px solid #2563eb;
  }
  .prose strong {
    font-weight: 700;
  }
  .prose em {
    font-style: italic;
  }

  /* Spin animation for loading */
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  .spin {
    animation: spin 0.6s linear infinite;
  }

  /* Message slide-in */
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .slide-in {
    animation: slideIn 0.25s ease-out;
  }
</style>

<script>
  let active_documents = [];
  let session_id = null;

  const fileInput = document.getElementById("documents");
  const documentList = document.getElementById("document-list");
  const chatBox = document.getElementById("chat-box");
  const emptyState = document.getElementById("empty-state");
  const sendBtn = document.getElementById("send-btn");
  const messageInput = document.getElementById("message");

  // Auto-resize textarea
  messageInput.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 112) + "px";
  });

  // ── Document Cards ──────────────────────────────────────────────────────────

  function createDocumentCard(name, id) {
    emptyState.style.display = "none";
    sendBtn.disabled = true;
    const card = document.createElement("div");
    card.id = "doc-" + id;
    card.className =
      "flex items-center gap-2 p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm";
    card.innerHTML = `
      <div class="w-4 h-4 border-2 border-gray-300 border-t-blue-500 rounded-full spin flex-shrink-0"></div>
      <span class="truncate text-gray-700" title="${name}">${name}</span>
    `;
    documentList.appendChild(card);
  }

  function markReady(id) {
    const card = document.getElementById("doc-" + id);
    if (!card) return;
    sendBtn.disabled = false;
    card.innerHTML = `
      <span class="text-green-500 font-bold flex-shrink-0">✓</span>
      <span class="truncate text-gray-700">Document Ready</span>
    `;
  }

  function markFailed(id) {
    const card = document.getElementById("doc-" + id);
    if (!card) return;
    sendBtn.disabled = false;
    card.innerHTML = `
      <span class="text-red-500 font-bold flex-shrink-0">⚠</span>
      <span class="truncate text-gray-700">Processing Failed</span>
    `;
  }

  // ── File Upload ─────────────────────────────────────────────────────────────

  fileInput.addEventListener("change", async () => {
    const files = fileInput.files;
    if (!files.length) return;

    active_documents = [];
    documentList.innerHTML = "";

    const formData = new FormData();
    const tempIds = [];

    for (let file of files) {
      const tempId = crypto.randomUUID();
      tempIds.push(tempId);
      createDocumentCard(file.name, tempId);
      formData.append("documents", file);
    }

    try {
      const res = await fetch("/api/documents/upload", {
        method: "POST",
        body: formData,
        credentials: "include",
      });

      if (!res.ok) throw new Error("Upload failed");

      const data = await res.json();

      // ✅ Fixed: map each returned doc to its temp card by index
      data.documents.forEach((doc, index) => {
        const card = document.getElementById("doc-" + tempIds[index]);
        if (card) {
          card.id = "doc-" + doc.document_id;
          active_documents.push(doc);
        }
      });
    } catch (error) {
      console.error("Upload error:", error);
    }

    fileInput.value = "";
  });

  // ── Document Status SSE ─────────────────────────────────────────────────────

  const evt = new EventSource("/api/document-status-stream");
  evt.addEventListener("update", (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.status === "READY") markReady(data.document_id);
      else if (data.status === "FAILED") markFailed(data.document_id);
    } catch (e) {
      console.error("Status stream error:", e);
    }
  });
  evt.onerror = () => {
    console.error("EventSource failed");
    evt.close();
  };

  // ── Send Message ────────────────────────────────────────────────────────────
  messageInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(e);
    }
  });
  async function sendMessage(e) {
    e.preventDefault();

    const message = messageInput.value.trim();
    if (!message) return;

    // User bubble
    const userEl = document.createElement("div");
    userEl.className = "flex justify-end slide-in";
    userEl.innerHTML = `
      <div class="max-w-xl px-4 py-2 bg-blue-600 text-white rounded-lg rounded-br-sm text-sm leading-relaxed">
        ${escapeHtml(message)}
      </div>
    `;
    chatBox.appendChild(userEl);

    messageInput.value = "";
    messageInput.style.height = "auto";
    sendBtn.disabled = true;

    const formData = new FormData();
    formData.append("message", message);
    if (session_id) formData.append("session_id", session_id);
    if (active_documents.length > 0)
      formData.append("active_documents", JSON.stringify(active_documents));

    // Assistant bubble
    const assistantEl = document.createElement("div");
    assistantEl.className = "flex justify-start slide-in";
    const bubbleEl = document.createElement("div");
    bubbleEl.className =
      "max-w-xl px-4 py-2 bg-white border border-gray-200 rounded-lg rounded-bl-sm text-sm leading-relaxed prose";
    bubbleEl.innerHTML = "<em class='text-gray-400'>Thinking...</em>";
    assistantEl.appendChild(bubbleEl);
    chatBox.appendChild(assistantEl);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const response = await fetch("/api/chat/stream", {
        method: "POST",
        body: formData,
        credentials: "include",
      });
      if (!response.ok) throw new Error("Chat request failed");
      await parseSSEStream(response, bubbleEl);
    } catch (error) {
      console.error("Chat error:", error);
      bubbleEl.innerHTML =
        '<span class="text-red-500">❌ Failed to send message.</span>';
    } finally {
      sendBtn.disabled = false;
      messageInput.focus();
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  }

 async function parseSSEStream(response, bubbleEl) {

  const reader = response.body.getReader();
  const decoder = new TextDecoder();

  let fullMessage = "";
  let buffer = "";

  while (true) {

    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });

    const parts = buffer.split("\n\n");
    buffer = parts.pop(); // keep incomplete chunk

    for (let part of parts) {

      if (!part.startsWith("data:")) continue;

      let data = part.replace("data:", "").trim();

      if (!data) continue;

      if (data.startsWith("SESSION:")) {
        session_id = data.replace("SESSION:", "");
        console.log("Session:", session_id);
        continue;
      }

      if (data === "[END]") {
        return;
      }

      try {

        const parsed = JSON.parse(data);

        if (parsed.content) {

          fullMessage += parsed.content;

          bubbleEl.innerHTML = marked.parse(fullMessage);

          chatBox.scrollTop = chatBox.scrollHeight;
        }

      } catch (err) {
        console.error("JSON parse error:", err, data);
      }

    }
  }
}

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function escapeHtml(text) {
    return text.replace(
      /[&<>"']/g,
      (m) =>
        ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[m],
    );
  }

  window.addEventListener("load", () => messageInput.focus());
</script>

{% endblock %}
