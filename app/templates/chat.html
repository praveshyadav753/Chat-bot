{% extends "base.html" %}
{% block content %}

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0f1117;
    --surface:     #161920;
    --surface2:    #1d2130;
    --border:      #252b3b;
    --border-subtle: #1e2333;
    --accent:      #4f8ef7;
    --accent-dim:  #1e3566;
    --text:        #dde4f0;
    --text-sub:    #8896b0;
    --user-bg:     #1a2d52;
    --user-border: #2a4a85;
    --bot-bg:      #161920;
    --danger:      #ef4444;
    --success:     #22c55e;
    --warning:     #f59e0b;
    --radius:      14px;
    --font:        'DM Sans', sans-serif;
    --mono:        'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--surface);
  }
  .header-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
    50%       { opacity: 0.6; box-shadow: 0 0 3px var(--accent); }
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
  .header-badge {
    margin-left: auto; font-size: 11px; color: var(--text-sub);
    font-family: var(--mono); background: var(--surface2);
    padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
  }

  /* ── Chat box ───────────────────────────────────────────────────────────── */
  #chat-box {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 20px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chat-box::-webkit-scrollbar { width: 4px; }
  #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Input area ─────────────────────────────────────────────────────────── */
  .input-area {
    flex-shrink: 0; padding: 12px 20px 16px;
    border-top: 1px solid var(--border); background: var(--surface);
  }

  /* ── Staged chip tray ───────────────────────────────────────────────────── */
  #staged-files { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  #staged-files:empty { display: none; }

  .staged-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; font-size: 12px; color: var(--text-sub);
    max-width: 220px; transition: border-color 0.2s, background 0.2s;
  }
  .staged-chip.uploading  { border-color: var(--accent);  background: #0f1f3d; }
  .staged-chip.processing { border-color: var(--warning); background: #1f1500; }
  .staged-chip.ready      { border-color: var(--success); background: #0a1f10; }
  .staged-chip.failed     { border-color: var(--danger);  background: #1f0808; }

  .staged-chip .chip-icon  { font-size: 13px; flex-shrink: 0; }
  .staged-chip .chip-name  {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; color: var(--text);
  }
  .chip-badge {
    font-size: 10px; font-family: var(--mono); flex-shrink: 0; white-space: nowrap;
  }
  .staged-chip.uploading  .chip-badge { color: var(--accent); }
  .staged-chip.processing .chip-badge { color: var(--warning); }
  .staged-chip.ready      .chip-badge { color: var(--success); }
  .staged-chip.failed     .chip-badge { color: var(--danger); }

  .chip-spinner {
    width: 10px; height: 10px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  .staged-chip.uploading  .chip-spinner { border-top-color: var(--accent); }
  .staged-chip.processing .chip-spinner { border-top-color: var(--warning); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chip-remove {
    flex-shrink: 0; cursor: pointer; opacity: 0;
    font-size: 13px; line-height: 1; transition: opacity 0.15s;
    color: var(--text-sub);
  }
  .staged-chip.ready:hover  .chip-remove,
  .staged-chip.failed:hover .chip-remove { opacity: 0.6; }
  .staged-chip.ready:hover  .chip-remove:hover,
  .staged-chip.failed:hover .chip-remove:hover { opacity: 1; }
  .staged-chip.uploading  .chip-remove,
  .staged-chip.processing .chip-remove { cursor: not-allowed; }

  /* ── Input row ──────────────────────────────────────────────────────────── */
  .input-row { display: flex; align-items: flex-end; gap: 8px; }

  .attach-btn {
    width: 38px; height: 38px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    color: var(--text-sub);
  }
  .attach-btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }

  #message {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    font-size: 14px; font-family: var(--font); color: var(--text);
    resize: none; max-height: 140px; line-height: 1.55;
    outline: none; transition: border-color 0.15s;
  }
  #message:focus { border-color: var(--accent); }
  #message::placeholder { color: var(--text-sub); }

  #send-btn {
    height: 38px; padding: 0 18px; min-width: 80px;
    background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s; white-space: nowrap;
  }
  #send-btn:hover:not(:disabled) { background: #3b7ae8; }
  #send-btn:disabled {
    opacity: 0.5; cursor: not-allowed; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text-sub);
  }

  /* ── Message rows ───────────────────────────────────────────────────────── */
  .msg-row {
    display: flex; flex-direction: column; gap: 6px;
    animation: rise 0.22s ease;
  }
  .msg-row.user { align-items: flex-end; }
  .msg-row.bot  { align-items: flex-start; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .attach-strip { display: flex; flex-wrap: wrap; gap: 6px; max-width: 72%; }
  .msg-row.user .attach-strip { justify-content: flex-end; }

  .attach-card {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 11px; border-radius: 8px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    max-width: 190px;
  }
  .attach-card.ready  { border-color: var(--success); }
  .attach-card.failed { border-color: var(--danger); }
  .msg-row.user .attach-card { background: #1a3060; border-color: var(--user-border); }
  .msg-row.user .attach-card.ready { border-color: var(--success); }
  .attach-card .ac-icon { font-size: 16px; flex-shrink: 0; }
  .attach-card .ac-info { display: flex; flex-direction: column; overflow: hidden; }
  .attach-card .ac-name {
    font-size: 12px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .attach-card .ac-status { font-size: 10px; color: var(--success); margin-top: 1px; font-family: var(--mono); }

  .role-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-sub); padding: 0 2px;
  }

  .bubble {
    max-width: 72%; padding: 10px 14px;
    border-radius: var(--radius); font-size: 14px;
    line-height: 1.65; word-break: break-word;
  }
  .bubble.user {
    background: var(--user-bg); border: 1px solid var(--user-border);
    border-radius: var(--radius) var(--radius) 4px var(--radius); color: #c8d8f0;
  }
  .bubble.bot {
    background: var(--bot-bg); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }

  /* ── Markdown inside bot bubble ─────────────────────────────────────────── */
  .bubble.bot p  { margin: 5px 0; }
  .bubble.bot h1, .bubble.bot h2, .bubble.bot h3 { font-weight: 600; margin: 12px 0 4px; }
  .bubble.bot h1 { font-size: 1.15em; }
  .bubble.bot h2 { font-size: 1.05em; }
  .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin: 6px 0; }
  .bubble.bot li { margin: 3px 0; }
  .bubble.bot code {
    background: #1b2038; font-family: var(--mono);
    font-size: 0.84em; padding: 2px 6px; border-radius: 4px; color: #9cb8f0;
  }
  .bubble.bot pre {
    background: #11141e; border: 1px solid var(--border);
    border-radius: 9px; padding: 0; overflow: hidden; margin: 10px 0;
  }
  .bubble.bot pre code {
    display: block; padding: 14px; overflow-x: auto;
    background: transparent; color: #b8cce8; font-size: 0.84em;
  }
  .bubble.bot table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 10px 0; }
  .bubble.bot th, .bubble.bot td { border: 1px solid var(--border); padding: 6px 10px; }
  .bubble.bot th { background: var(--surface2); }
  .bubble.bot blockquote {
    border-left: 3px solid var(--accent); padding-left: 12px;
    color: var(--text-sub); margin: 8px 0; font-style: italic;
  }
  .bubble.bot a { color: var(--accent); text-decoration: underline; }

  /* ── Streaming cursor ───────────────────────────────────────────────────── */
  .stream-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--accent); margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink-cursor 0.6s steps(1) infinite;
  }
  @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Thinking dots ──────────────────────────────────────────────────────── */
  .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .thinking span {
    width: 6px; height: 6px; background: var(--text-sub);
    border-radius: 50%; animation: blink 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1.1); }
  }

  /* ── Progress bubble — node steps shown before LLM starts ──────────────── */

  /* Steps list */
  .progress-steps {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 12px;
    color: var(--text-sub);
    font-family: var(--mono);
  }

  /* Single step row */
  .step {
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
    transition: opacity 0.25s ease;
  }

  /* Done steps fade back */
  .step.done   { opacity: 0.38; }
  .step.active { opacity: 1; color: var(--text); }

  /* Spinner for the active step */
  .step-spinner {
    width: 9px; height: 9px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }

  /* ✓ tick that replaces spinner when step is done */
  .step-tick {
    width: 9px; flex-shrink: 0;
    color: var(--success);
    font-size: 10px;
    text-align: center;
    line-height: 1;
  }

  .step-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Divider between the steps summary and the LLM response text */
  .response-text {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-subtle);
  }

  /* If no steps were ever shown (graph ran too fast), skip the divider */
  .bubble.bot .progress-steps:empty + .response-text {
    border-top: none;
    margin-top: 0;
    padding-top: 0;
  }

  /* ── Empty placeholder ──────────────────────────────────────────────────── */
  .chat-placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-sub);
    user-select: none; pointer-events: none;
  }
  .chat-placeholder .ph-icon { font-size: 36px; opacity: 0.25; }
  .chat-placeholder p { font-size: 13px; opacity: 0.45; }
</style>

<div class="shell">
  <header class="header">
    <div class="header-dot"></div>
    <h1>Smart Chat</h1>
    <span class="header-badge" id="session-label">no session</span>
  </header>

  <div id="chat-box">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="ph-icon">💬</div>
      <p>Start a conversation or attach documents</p>
    </div>
  </div>

  <div class="input-area">
    <input type="file" id="documents" multiple style="display:none">
    <div id="staged-files"></div>
    <div class="input-row">
      <button class="attach-btn" type="button"
        onclick="document.getElementById('documents').click()" title="Attach files">
        &#128206;
      </button>
      <textarea id="message" rows="1" placeholder="Ask something… (Shift+Enter for new line)"></textarea>
      <button id="send-btn" onclick="sendMessage(event)">Send</button>
    </div>
  </div>
</div>

<script src="/static/scripts.js?v=2" defer></script>

{% endblock %}
