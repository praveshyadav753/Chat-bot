{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  /* ── Variables — aligned with base.html palette ─────────────────────────── */
  :root {
    --bg:            #0f1117;
    --surface:       #161920;
    --surface2:      #1d2130;
    --surface3:      #232840;
    --border:        #252b3b;
    --border-subtle: #1e2333;
    --border-bright: #2e3a55;

    --accent:        #4f8ef7;
    --accent-dim:    #1e3566;
    --accent-glow:   rgba(79,142,247,0.12);
    --accent-hover:  #3b7ae8;

    --text:          #dde4f0;
    --text-sub:      #8896b0;
    --text-muted:    #4a5568;

    --user-bg:       #1a2d52;
    --user-border:   #2a4a85;
    --bot-bg:        #161920;

    --danger:        #ef4444;
    --success:       #22c55e;
    --warning:       #f59e0b;

    --radius:        12px;
    --radius-sm:     8px;
    --mono:          'DM Mono', ui-monospace, monospace;
  }

  .shell *, .shell *::before, .shell *::after { box-sizing: border-box; }

  /* navbar is 52px tall — shell fills the rest */
  .shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── Chat scroll area ────────────────────────────────────────────────────── */
  #chat-box {
    flex: 1; overflow-y: auto;
    padding: 24px 20px;
    display: flex; flex-direction: column; gap: 20px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chat-box::-webkit-scrollbar { width: 3px; }
  #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Input area ──────────────────────────────────────────────────────────── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  /* ── Session label row ───────────────────────────────────────────────────── */
  .session-row { display: flex; justify-content: flex-end; margin-bottom: 6px; }
  #session-label {
    font-size: 10px; color: var(--text-muted); font-family: var(--mono);
    background: var(--surface2); padding: 2px 10px;
    border-radius: 20px; border: 1px solid var(--border);
  }

  /* ── Staged file chips ───────────────────────────────────────────────────── */
  #staged-files { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  #staged-files:empty { display: none; }

  .staged-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; font-size: 11px; color: var(--text-sub);
    max-width: 220px; transition: border-color 0.2s, background 0.2s;
  }
  .staged-chip.uploading  { border-color: var(--accent);  background: #0f1f3d; color: var(--accent); }
  .staged-chip.processing { border-color: var(--warning); background: #1f1500; color: var(--warning); }
  .staged-chip.ready      { border-color: var(--success); background: #0a1f10; color: var(--success); }
  .staged-chip.failed     { border-color: var(--danger);  background: #1f0808; color: var(--danger); }

  .staged-chip .chip-icon { font-size: 12px; flex-shrink: 0; }
  .staged-chip .chip-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; color: var(--text); font-size: 12px;
  }
  .chip-badge { font-size: 10px; font-family: var(--mono); flex-shrink: 0; white-space: nowrap; }

  .chip-spinner {
    width: 9px; height: 9px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.1); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .staged-chip.uploading  .chip-spinner { border-top-color: var(--accent); }
  .staged-chip.processing .chip-spinner { border-top-color: var(--warning); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chip-remove {
    flex-shrink: 0; cursor: pointer; opacity: 0;
    font-size: 12px; line-height: 1; transition: opacity 0.15s; color: var(--text-sub);
  }
  .staged-chip.ready:hover  .chip-remove,
  .staged-chip.failed:hover .chip-remove { opacity: 0.6; }
  .staged-chip.ready:hover  .chip-remove:hover,
  .staged-chip.failed:hover .chip-remove:hover { opacity: 1; color: var(--danger); }
  .staged-chip.uploading  .chip-remove,
  .staged-chip.processing .chip-remove { cursor: not-allowed; }

  /* ── Input row ───────────────────────────────────────────────────────────── */
  .input-row { display: flex; align-items: flex-end; gap: 8px; }

  .attach-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-sub);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .attach-btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }

  .input-wrapper {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrapper:focus-within {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #message {
    width: 100%; background: transparent; border: none;
    padding: 9px 14px; font-size: 14px; color: var(--text);
    font-family: inherit; resize: none; max-height: 140px;
    line-height: 1.55; outline: none;
  }
  #message::placeholder { color: var(--text-muted); }

  #send-btn {
    height: 38px; padding: 0 18px; min-width: 76px; flex-shrink: 0;
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
  }
  #send-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
    transform: translateY(-1px);
  }
  #send-btn:active:not(:disabled) { transform: translateY(0); }
  #send-btn:disabled {
    opacity: 0.45; cursor: not-allowed; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text-sub);
    box-shadow: none; transform: none;
  }

  /* ── Message rows ────────────────────────────────────────────────────────── */
  .msg-row {
    display: flex; flex-direction: column; gap: 5px;
    animation: rise 0.2s ease;
  }
  .msg-row.user { align-items: flex-end; }
  .msg-row.bot  { align-items: flex-start; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .attach-strip { display: flex; flex-wrap: wrap; gap: 6px; max-width: 72%; }
  .msg-row.user .attach-strip { justify-content: flex-end; }

  .attach-card {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 11px; border-radius: var(--radius-sm); font-size: 12px;
    border: 1px solid var(--border); background: var(--surface2); max-width: 190px;
  }
  .attach-card.ready  { border-color: var(--success); }
  .attach-card.failed { border-color: var(--danger); }
  .msg-row.user .attach-card { background: #1a3060; border-color: var(--user-border); }
  .msg-row.user .attach-card.ready { border-color: var(--success); }
  .attach-card .ac-icon { font-size: 16px; flex-shrink: 0; }
  .attach-card .ac-info { display: flex; flex-direction: column; overflow: hidden; }
  .attach-card .ac-name {
    font-size: 12px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .attach-card .ac-status { font-size: 10px; color: var(--success); margin-top: 1px; font-family: var(--mono); }

  .role-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted); padding: 0 2px;
  }

  .bubble {
    max-width: 72%; padding: 10px 14px;
    border-radius: var(--radius); font-size: 14px;
    line-height: 1.65; word-break: break-word;
  }
  .bubble.user {
    background: var(--user-bg); border: 1px solid var(--user-border);
    border-radius: var(--radius) var(--radius) 4px var(--radius); color: #c8d8f0;
  }
  .bubble.bot {
    background: var(--bot-bg); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }

  /* ── Markdown ────────────────────────────────────────────────────────────── */
  .bubble.bot p  { margin: 5px 0; }
  .bubble.bot h1, .bubble.bot h2, .bubble.bot h3 { font-weight: 600; margin: 12px 0 4px; }
  .bubble.bot h1 { font-size: 1.15em; }
  .bubble.bot h2 { font-size: 1.05em; }
  .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin: 6px 0; }
  .bubble.bot li { margin: 3px 0; }
  .bubble.bot code {
    background: #1b2038; font-family: var(--mono);
    font-size: 0.84em; padding: 2px 6px; border-radius: 4px; color: #9cb8f0;
  }
  .bubble.bot pre {
    background: #11141e; border: 1px solid var(--border);
    border-radius: 9px; padding: 0; overflow: hidden; margin: 10px 0;
  }
  .bubble.bot pre code {
    display: block; padding: 14px; overflow-x: auto;
    background: transparent; color: #b8cce8; font-size: 0.84em;
  }
  .bubble.bot table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 10px 0; }
  .bubble.bot th, .bubble.bot td { border: 1px solid var(--border); padding: 6px 10px; }
  .bubble.bot th { background: var(--surface2); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-sub); }
  .bubble.bot blockquote {
    border-left: 2px solid var(--accent); padding-left: 12px;
    color: var(--text-sub); margin: 8px 0; font-style: italic;
  }
  .bubble.bot a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

  /* ── Streaming cursor ────────────────────────────────────────────────────── */
  .stream-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--accent); margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink-cursor 0.6s steps(1) infinite;
  }
  @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Progress / thinking ─────────────────────────────────────────────────── */
  .thinking-dots { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .thinking-dots span {
    width: 5px; height: 5px; background: var(--text-muted);
    border-radius: 50%; animation: blink-dot 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink-dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1.1); }
  }

  .progress-steps {
    display: flex; flex-direction: column; gap: 5px;
    font-size: 11px; color: var(--text-sub); font-family: var(--mono);
  }
  .step { display: flex; align-items: center; gap: 7px; line-height: 1.4; transition: opacity 0.25s; }
  .step.done   { opacity: 0.3; }
  .step.active { opacity: 1; color: var(--text); }
  .step-spinner {
    width: 8px; height: 8px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }
  .step-tick { width: 8px; flex-shrink: 0; color: var(--success); font-size: 10px; text-align: center; line-height: 1; }
  .step-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .response-text { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-subtle); }
  .bubble.bot .progress-steps:empty + .response-text { border-top: none; margin-top: 0; padding-top: 0; }

  /* ── Empty placeholder ───────────────────────────────────────────────────── */
  .chat-placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-sub);
    user-select: none; pointer-events: none;
  }
  .ph-glyph {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; opacity: 0.25;
  }
  .chat-placeholder p { font-size: 13px; opacity: 0.4; }

  /* ── Clarification widget ────────────────────────────────────────────────── */
  .clarif-bubble {
    max-width: 88% !important; padding: 0 !important;
    overflow: hidden; border-color: var(--border-bright) !important;
  }

  .clarif-header {
    display: flex; flex-direction: column; gap: 4px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .clarif-eyebrow {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent); opacity: 0.7;
  }
  .clarif-question { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.5; }

  .clarif-list { display: flex; flex-direction: column; }

  .clarif-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border-subtle); transition: background 0.12s;
  }
  .clarif-item:last-child { border-bottom: none; }
  .clarif-item:hover, .clarif-item.clarif-focused { background: var(--surface2); }

  .clarif-num {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: var(--mono); font-weight: 500;
    color: var(--text-sub); flex-shrink: 0; transition: all 0.12s;
  }
  .clarif-item.clarif-focused .clarif-num { background: var(--accent); border-color: var(--accent); color: #fff; }

  .clarif-item-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }

  .clarif-arrow { font-size: 12px; color: var(--accent); opacity: 0; margin-left: auto; transition: opacity 0.12s; }
  .clarif-item.clarif-focused .clarif-arrow { opacity: 1; }

  .clarif-pencil {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; color: var(--text-sub);
  }
  .clarif-item.clarif-focused .clarif-pencil { background: var(--accent-dim); border-color: var(--accent); color: #9cb8f0; }
  .clarif-something .clarif-item-text { color: var(--text-sub); font-style: italic; }
  .clarif-something.clarif-focused .clarif-item-text { color: var(--text); font-style: normal; }

  .clarif-freetext-wrap {
    display: flex; gap: 8px; padding: 10px 16px;
    border-top: 1px solid var(--border); align-items: center;
    background: var(--surface2);
  }
  .clarif-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 12px; font-size: 13px;
    font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .clarif-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .clarif-input::placeholder { color: var(--text-muted); }

  .clarif-freetext-wrap button {
    padding: 7px 16px; background: var(--accent); border: none;
    border-radius: var(--radius-sm); color: #fff; font-size: 13px;
    font-family: inherit; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .clarif-freetext-wrap button:hover { background: var(--accent-hover); }

  .clarif-hint {
    padding: 7px 16px; font-size: 10px; color: var(--text-muted);
    font-family: var(--mono); text-align: center;
    border-top: 1px solid var(--border-subtle); letter-spacing: 0.03em;
  }
</style>

<div class="shell">

  <div id="chat-box">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="ph-glyph">💬</div>
      <p>Start a conversation or attach documents</p>
    </div>
  </div>

  <div class="input-area">
    <input type="file" id="documents" multiple style="display:none">
    <div class="session-row">
      <span id="session-label">no session</span>
    </div>
    <div id="staged-files"></div>
    <div class="input-row">
      <button class="attach-btn" type="button" aria-label="Attach files"
        onclick="document.getElementById('documents').click()" title="Attach files">
        &#128206;
      </button>
      <div class="input-wrapper">
        <textarea id="message" rows="1"
          placeholder="Ask anything…  (Shift+Enter for new line)"></textarea>
      </div>
      <button id="send-btn" onclick="sendMessage(event)">Send</button>
    </div>
  </div>

</div>

<script src="/static/scripts.js?v=4" defer></script>

{% endblock %}
