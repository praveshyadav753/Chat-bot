services:

  # ── FastAPI app ───────────────────────────────────────────────────────────────
  api:
    image: praveshyadav71/chatbot:latest
    build:
      context: .
      dockerfile: dockerfile          
      target: runtime
    container_name: chatbot_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # environment:
      # DATABASE_URL: ${DATABASE_URL}
      # DATABASE_URL1: ${DATABASE_URL1}
      # REDIS_URL: ${REDIS_URL}
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_db
    depends_on:
     
      redis:
        condition: service_healthy
    networks:
      - chatbot_net

  # ── Celery worker different command 
  celery:
    image: praveshyadav71/chatbot:latest   
    container_name: chatbot_celery
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker",
              "--loglevel=info",
              "--concurrency=2",
              "--pool=prefork",
              "-Q", "default"]
    env_file:
      - .env
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   DATABASE_URL1: ${DATABASE_URL1}
    #   REDIS_URL: ${REDIS_URL}
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_db
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chatbot_net

 
  

  # ── Redis 
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flower — Celery monitor (dev only) ────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: chatbot_flower
    restart: unless-stopped
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chatbot_net
    profiles:
      - dev

volumes:
  redis_data:
  uploads_data:
  chroma_data:

networks:
  chatbot_net:
    driver: bridge