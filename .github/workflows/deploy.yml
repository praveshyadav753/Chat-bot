name: ChatApp + Celery — CI/CD

on:
  push:
    branches:
      - deployement

jobs:
  # ─────────────────────────────────────────────
  # BUILD IMAGE
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        run: |
          set -e

          IMAGE_URI=702252494235.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

          echo "IMAGE_URI=$IMAGE_URI"

          docker build --platform linux/amd64 -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "$IMAGE_URI" > image.txt
          echo "Saved IMAGE:"
          cat image.txt

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.txt

  # ─────────────────────────────────────────────
  # FASTAPI DEPLOY
  # ─────────────────────────────────────────────
  deploy-fastapi:
    name: Deploy FastAPI
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Read Image
        run: |
          IMAGE=$(cat image.txt)
          echo "IMAGE=$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Fail if image is empty
        run: |
          if [ -z "$IMAGE" ]; then
            echo "❌ IMAGE is EMPTY"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ env.IMAGE }}

      - name: Deploy FastAPI
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────
  # CELERY DEPLOY
  # ─────────────────────────────────────────────
  deploy-celery:
    name: Deploy Celery
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Read Image
        run: |
          IMAGE=$(cat image.txt)
          echo "IMAGE=$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Fail if image is empty
        run: |
          if [ -z "$IMAGE" ]; then
            echo "❌ IMAGE is EMPTY"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef-celery.json
          container-name: ${{ secrets.CONTAINER_NAME_CELERY }}
          image: ${{ env.IMAGE }}

      - name: Deploy Celery
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_CELERY }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true