name: ChatApp + Celery — CI/CD

on:
  push:
    branches:
      - deployement

jobs:
  # ─────────────────────────────────────────────
  # BUILD IMAGE
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}          # ← directly from secrets

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build & Push
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=${ECR_REGISTRY}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          echo "IMAGE_URI=$IMAGE_URI"

          docker build --platform linux/amd64 -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Saved output: $(cat $GITHUB_OUTPUT)"


  # ─────────────────────────────────────────────
  # FASTAPI DEPLOY
  # ─────────────────────────────────────────────
  deploy-fastapi:
    name: Deploy FastAPI
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}          # ← directly from secrets

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy FastAPI
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────
  # CELERY DEPLOY
  # ─────────────────────────────────────────────
  deploy-celery:
    name: Deploy Celery
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}          # ← directly from secrets

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef-celery.json
          container-name: ${{ secrets.CONTAINER_NAME_CELERY }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy Celery
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_CELERY }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true